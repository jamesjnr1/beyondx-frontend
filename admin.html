<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BeyondX Admin — Payout Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f1a14;color:#fff;font-family:'system-ui',sans-serif;min-height:100vh;}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:#1a2e1f;border:1.5px solid #2a4a2f;border-radius:16px;padding:40px;width:360px;}
.login-box h1{font-size:22px;font-weight:800;margin-bottom:6px;}
.login-box p{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:24px;}
input{width:100%;padding:10px 14px;background:#0f1a14;border:1.5px solid #2a4a2f;border-radius:8px;color:#fff;font-size:14px;outline:none;margin-bottom:12px;}
input:focus{border-color:#40b86e;}
button{width:100%;padding:11px;background:#257a45;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
button:hover{background:#2d9356;}
.dashboard{display:none;padding:24px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#1a2e1f;border-bottom:1px solid #2a4a2f;margin:-24px -24px 24px;}
.topbar h1{font-size:18px;font-weight:800;}
.topbar span{font-size:12px;color:rgba(255,255,255,.4);font-family:monospace;}
.tabs{display:flex;gap:8px;margin-bottom:24px;}
.tab{padding:8px 18px;border-radius:8px;border:1.5px solid #2a4a2f;background:transparent;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;cursor:pointer;}
.tab.active{background:#257a45;border-color:#257a45;color:#fff;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat{background:#1a2e1f;border:1.5px solid #2a4a2f;border-radius:12px;padding:18px;}
.stat-n{font-size:28px;font-weight:800;color:#40b86e;}
.stat-l{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;}
.card{background:#1a2e1f;border:1.5px solid #2a4a2f;border-radius:12px;padding:18px;margin-bottom:12px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-title{font-size:15px;font-weight:700;}
.badge{font-size:10px;font-family:monospace;padding:3px 10px;border-radius:4px;font-weight:600;}
.badge-pending{background:#2a1a0a;color:#ffa500;}
.badge-done{background:#0a2a1a;color:#40b86e;}
.badge-open{background:#1a1a2a;color:#6b9fff;}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #2a4a2f;}
.info-row:last-child{border-bottom:none;}
.info-key{color:rgba(255,255,255,.4);}
.info-val{font-weight:600;color:#fff;}
.pay-btn{margin-top:14px;width:100%;padding:10px;background:#257a45;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
.pay-btn:hover{background:#2d9356;}
.empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,.3);font-size:14px;}
.amount{font-size:20px;font-weight:900;color:#40b86e;}
.worker-phone{font-family:monospace;font-size:15px;color:#40b86e;font-weight:700;}
.notification{position:fixed;bottom:24px;right:24px;background:#257a45;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;display:none;z-index:999;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginScreen">
  <div class="login-box">
    <h1>BeyondX Admin</h1>
    <p>Payout & Operations Dashboard</p>
    <input type="password" id="adminPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Sign In</button>
    <p id="loginErr" style="color:#ff6b6b;font-size:12px;margin-top:8px;display:none;">Incorrect password</p>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <h1>BeyondX Admin</h1>
    <span id="lastRefresh"></span>
    <button onclick="loadAll()" style="width:auto;padding:7px 16px;font-size:12px;background:#2a4a2f;border:none;border-radius:7px;color:#fff;cursor:pointer;margin-left:12px;">↻ Refresh</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="statPending">-</div><div class="stat-l">Awaiting Payout</div></div>
    <div class="stat"><div class="stat-n" id="statActive">-</div><div class="stat-l">In Progress</div></div>
    <div class="stat"><div class="stat-n" id="statOpen">-</div><div class="stat-l">Open Tasks</div></div>
    <div class="stat"><div class="stat-n" id="statDone">-</div><div class="stat-l">Completed</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('payouts',this)">Awaiting Payout</button>
    <button class="tab" onclick="switchTab('active',this)">In Progress</button>
    <button class="tab" onclick="switchTab('open',this)">Open</button>
    <button class="tab" onclick="switchTab('all',this)">All Tasks</button>
  </div>

  <div id="content"></div>
</div>

<div class="notification" id="notif"></div>

<script>
const API = 'https://beyondx-backend-production-1a08.up.railway.app';
let adminPassword = '';
let allTasks = [];
let currentTab = 'payouts';

function doLogin(){
  const pass = document.getElementById('adminPass').value;
  adminPassword = pass;
  fetch(`${API}/admin/all`, { headers: { 'x-admin-password': pass } })
    .then(r => {
      if(!r.ok) throw new Error('bad');
      return r.json();
    })
    .then(data => {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      allTasks = data.tasks;
      render();
    })
    .catch(() => {
      document.getElementById('loginErr').style.display = 'block';
    });
}

async function loadAll(){
  try {
    const r = await fetch(`${API}/admin/all`, { headers: { 'x-admin-password': adminPassword } });
    const data = await r.json();
    allTasks = data.tasks;
    document.getElementById('lastRefresh').textContent = 'Last refresh: ' + new Date().toLocaleTimeString();
    render();
  } catch(e) { notify('Could not refresh'); }
}

function switchTab(tab, el){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  const pending = allTasks.filter(t => t.status === 'pending_confirmation');
  const active  = allTasks.filter(t => t.status === 'accepted');
  const open    = allTasks.filter(t => t.status === 'open');
  const done    = allTasks.filter(t => t.status === 'completed');

  document.getElementById('statPending').textContent = pending.length;
  document.getElementById('statActive').textContent  = active.length;
  document.getElementById('statOpen').textContent    = open.length;
  document.getElementById('statDone').textContent    = done.length;

  const map = { payouts: pending, active, open, all: allTasks };
  const tasks = map[currentTab] || [];

  if(!tasks.length){
    document.getElementById('content').innerHTML = `<div class="empty">No tasks in this category</div>`;
    return;
  }

  document.getElementById('content').innerHTML = tasks.map(t => taskCard(t)).join('');
}

function taskCard(t){
  const worker = t.acceptedBy;
  const employer = t.employer;
  const pay = parseFloat(t.pay).toFixed(2);
  const workerPay = (parseFloat(t.pay) * 0.85).toFixed(2); // after 15% platform fee

  const badgeMap = {
    open: 'badge-open',
    accepted: 'badge-done',
    pending_confirmation: 'badge-pending',
    completed: 'badge-done'
  };
  const labelMap = {
    open: 'OPEN',
    accepted: 'IN PROGRESS',
    pending_confirmation: 'WORKER DONE — PAY NOW',
    completed: 'COMPLETED'
  };

  const payBtn = t.status === 'pending_confirmation' ? `
    <div style="background:#0a2a0a;border:1.5px solid #2a5a2a;border-radius:10px;padding:14px;margin-top:14px;">
      <div style="font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-family:monospace;">Send Payment Via Mobile Money</div>
      <div style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:6px;">Send <span class="amount">GH₵ ${workerPay}</span> to worker</div>
      ${worker ? `<div class="worker-phone">${worker.phone || 'No phone on record'}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:2px;">${worker.fullName} · ${worker.workerId}</div>` : '<div style="color:#ff6b6b;font-size:13px;">No worker info</div>'}
      <button class="pay-btn" onclick="markPaid('${t.id}', '${worker?.fullName||''}', '${worker?.phone||''}', '${workerPay}', '${t.taskType}', '${employer?.orgName||''}')">
        ✓ Mark as Paid — GH₵ ${workerPay}
      </button>
    </div>` : '';

  return `<div class="card">
    <div class="card-top">
      <div>
        <div class="card-title">${t.taskType}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:3px;">${t.location} · ${t.duration}</div>
      </div>
      <span class="badge ${badgeMap[t.status]||''}">${labelMap[t.status]||t.status.toUpperCase()}</span>
    </div>
    <div class="info-row"><span class="info-key">Employer</span><span class="info-val">${employer?.orgName||'—'} ${employer?.phone?'· '+employer.phone:''}</span></div>
    <div class="info-row"><span class="info-key">Worker</span><span class="info-val">${worker?.fullName||'Unassigned'} ${worker?.phone?'· '+worker.phone:''}</span></div>
    <div class="info-row"><span class="info-key">Total Paid by Employer</span><span class="info-val">GH₵ ${pay}</span></div>
    <div class="info-row"><span class="info-key">Worker Payout (85%)</span><span class="info-val" style="color:#40b86e;">GH₵ ${workerPay}</span></div>
    <div class="info-row"><span class="info-key">Platform Fee (15%)</span><span class="info-val">GH₵ ${(parseFloat(t.pay)*0.15).toFixed(2)}</span></div>
    ${t.description?`<div class="info-row"><span class="info-key">Notes</span><span class="info-val" style="font-size:12px;max-width:300px;text-align:right;">${t.description}</span></div>`:''}
    <div class="info-row"><span class="info-key">Posted</span><span class="info-val">${new Date(t.createdAt).toLocaleString()}</span></div>
    ${payBtn}
  </div>`;
}

async function markPaid(id, workerName, workerPhone, amount, taskType, employerName){
  if(!confirm(`Confirm you have sent GH₵ ${amount} to ${workerName} (${workerPhone})?`)) return;
  try {
    const r = await fetch(`${API}/admin/tasks/${id}/paid`, {
      method: 'PATCH',
      headers: { 'x-admin-password': adminPassword }
    });
    if(!r.ok) throw new Error();
    notify(`✓ ${workerName} marked as paid — GH₵ ${amount}`);
    await loadAll();
  } catch(e) { notify('Failed to update. Try again.'); }
}

function notify(msg){
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 3000);
}

// Auto refresh every 60 seconds
setInterval(() => { if(adminPassword) loadAll(); }, 60000);
</script>
</body>
</html>
