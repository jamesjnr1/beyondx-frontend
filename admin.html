<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BeyondX Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5faf6;font-family:system-ui,sans-serif;min-height:100vh;}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:#fff;border:1.5px solid #b8dfc9;border-radius:16px;padding:40px;width:340px;text-align:center;}
.login-box h1{font-size:20px;font-weight:800;color:#1a4d30;margin-bottom:6px;}
.login-box p{font-size:13px;color:#4d7a5e;margin-bottom:24px;}
.login-box input{width:100%;padding:10px 14px;border:1.5px solid #b8dfc9;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px;background:#f5faf6;}
.login-box input:focus{border-color:#257a45;}
.login-box button{width:100%;padding:11px;background:#1f6138;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
.dash{display:none;}
.topbar{background:#1a4d30;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{color:#fff;font-size:16px;font-weight:800;}
.topbar button{padding:7px 14px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;}
.body{max-width:720px;margin:0 auto;padding:24px 16px 80px;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:28px;}
.stat{background:#fff;border:1.5px solid #b8dfc9;border-radius:12px;padding:14px;text-align:center;}
.stat-n{font-size:24px;font-weight:900;color:#1f6138;}
.stat-l{font-size:11px;color:#4d7a5e;margin-top:3px;}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:7px 14px;border-radius:8px;border:1.5px solid #b8dfc9;background:#fff;color:#4d7a5e;font-size:12px;font-weight:600;cursor:pointer;}
.tab.active{background:#1f6138;border-color:#1f6138;color:#fff;}
.card{background:#fff;border:1.5px solid #b8dfc9;border-radius:12px;padding:18px;margin-bottom:10px;}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.card-title{font-size:15px;font-weight:700;color:#0d3320;}
.badge{font-size:10px;font-family:monospace;padding:3px 9px;border-radius:4px;font-weight:600;}
.badge-pay{background:#fff3cd;color:#856404;}
.badge-active{background:#e0f5ea;color:#1f6138;}
.badge-open{background:#e8f0fe;color:#1a56db;}
.badge-done{background:#f0f8f3;color:#257a45;}
.badge-cancelled{background:#fde8e8;color:#b91c1c;}
.row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #edf8f2;}
.row:last-of-type{border-bottom:none;}
.row-key{color:#4d7a5e;}
.row-val{font-weight:600;color:#0d3320;}
.payout-box{background:#edf8f2;border:1.5px solid #b8dfc9;border-radius:10px;padding:14px;margin-top:12px;}
.payout-amount{font-size:24px;font-weight:900;color:#1f6138;margin-bottom:4px;}
.payout-phone{font-family:monospace;font-size:16px;font-weight:700;color:#1f6138;}
.pay-btn{margin-top:12px;width:100%;padding:11px;background:#1f6138;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
.pay-btn:hover{background:#257a45;}
.empty{text-align:center;padding:40px 20px;color:#4d7a5e;font-size:14px;background:#fff;border:1.5px solid #b8dfc9;border-radius:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a4d30;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;display:none;z-index:999;}
@media(max-width:600px){.stats{grid-template-columns:repeat(3,1fr);}.tabs{gap:4px;}.tab{font-size:11px;padding:6px 10px;}}
</style>
</head>
<body>

<div class="login" id="loginScreen">
  <div class="login-box">
    <h1>BeyondX Admin</h1>
    <p>Enter your admin password to continue</p>
    <input type="password" id="adminPass" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()"/>
    <button onclick="login()">Sign In</button>
    <p id="err" style="color:#b91c1c;font-size:12px;margin-top:10px;display:none;">Incorrect password</p>
  </div>
</div>

<div class="dash" id="dash">
  <div class="topbar">
    <h1>BeyondX Admin</h1>
    <button onclick="load()">↻ Refresh</button>
  </div>
  <div class="body">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="sPayouts">-</div><div class="stat-l">Pay Now</div></div>
      <div class="stat"><div class="stat-n" id="sActive">-</div><div class="stat-l">In Progress</div></div>
      <div class="stat"><div class="stat-n" id="sOpen">-</div><div class="stat-l">Open</div></div>
      <div class="stat"><div class="stat-n" id="sDone">-</div><div class="stat-l">Completed</div></div>
      <div class="stat"><div class="stat-n" id="sAll">-</div><div class="stat-l">Total</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('payouts',this)">Pay Now</button>
      <button class="tab" onclick="switchTab('active',this)">In Progress</button>
      <button class="tab" onclick="switchTab('open',this)">Open</button>
      <button class="tab" onclick="switchTab('completed',this)">Completed</button>
      <button class="tab" onclick="switchTab('all',this)">All Tasks</button>
    </div>

    <div id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://beyondx-backend-production-1a08.up.railway.app';
let pass = '';
let tasks = [];
let currentTab = 'payouts';

function login(){
  pass = document.getElementById('adminPass').value;
  fetch(`${API}/admin/all`, { headers: {'x-admin-password': pass} })
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      tasks = data.tasks;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      render();
    })
    .catch(() => document.getElementById('err').style.display = 'block');
}

async function load(){
  try {
    const r = await fetch(`${API}/admin/all`, { headers: {'x-admin-password': pass} });
    const data = await r.json();
    tasks = data.tasks;
    render();
    showToast('Refreshed');
  } catch(e) { showToast('Could not refresh'); }
}

function switchTab(tab, el){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  const payouts   = tasks.filter(t => t.status === 'pending_confirmation');
  const active    = tasks.filter(t => t.status === 'accepted');
  const open      = tasks.filter(t => t.status === 'open');
  const completed = tasks.filter(t => t.status === 'completed');

  document.getElementById('sPayouts').textContent = payouts.length;
  document.getElementById('sActive').textContent  = active.length;
  document.getElementById('sOpen').textContent    = open.length;
  document.getElementById('sDone').textContent    = completed.length;
  document.getElementById('sAll').textContent     = tasks.length;

  const map = { payouts, active, open, completed, all: tasks };
  const list = map[currentTab] || [];

  if(!list.length){
    document.getElementById('content').innerHTML = `<div class="empty">No tasks in this category</div>`;
    return;
  }

  document.getElementById('content').innerHTML = list.map(t => taskCard(t)).join('');
}

function taskCard(t){
  const worker   = t.acceptedBy;
  const employer = t.employer;
  const total    = parseFloat(t.pay).toFixed(2);
  const workerPay = (parseFloat(t.pay) * 0.85).toFixed(2);
  const fee       = (parseFloat(t.pay) * 0.15).toFixed(2);

  const badges = {
    open:                 ['badge-open',      'OPEN'],
    accepted:             ['badge-active',    'IN PROGRESS'],
    pending_confirmation: ['badge-pay',       'PAY NOW'],
    completed:            ['badge-done',      'COMPLETED'],
    cancelled:            ['badge-cancelled', 'CANCELLED']
  };
  const [badgeClass, badgeLabel] = badges[t.status] || ['badge-open', t.status.toUpperCase()];

  const payoutSection = t.status === 'pending_confirmation' ? `
    <div class="payout-box">
      <div style="font-size:12px;color:#4d7a5e;margin-bottom:8px;">Send to worker via Mobile Money</div>
      <div class="payout-amount">GH₵ ${workerPay}</div>
      <div style="font-size:13px;font-weight:700;color:#0d3320;margin-bottom:2px;">${worker?.fullName||'Unknown'}</div>
      <div class="payout-phone">${worker?.phone||'No phone on record'}</div>
      <div style="font-size:11px;color:#4d7a5e;margin-top:2px;">${worker?.workerId||''}</div>
      <button class="pay-btn" onclick="markPaid('${t.id}','${worker?.fullName||''}','${workerPay}')">✓ I've Sent the Payment — Mark as Paid</button>
    </div>` : '';

  const workerRow = worker
    ? `<div class="row"><span class="row-key">Worker</span><span class="row-val">${worker.fullName} · ${worker.phone||'—'}</span></div>`
    : `<div class="row"><span class="row-key">Worker</span><span class="row-val" style="color:#4d7a5e;">Not yet assigned</span></div>`;

  return `<div class="card">
    <div class="card-head">
      <div>
        <div class="card-title">${t.taskType}</div>
        <div style="font-size:12px;color:#4d7a5e;margin-top:2px;">${t.location} · ${t.duration}</div>
      </div>
      <span class="badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="row"><span class="row-key">Employer</span><span class="row-val">${employer?.orgName||'—'} ${employer?.phone?'· '+employer.phone:''}</span></div>
    ${workerRow}
    <div class="row"><span class="row-key">Employer Paid</span><span class="row-val">GH₵ ${total}</span></div>
    <div class="row"><span class="row-key">Worker Gets</span><span class="row-val" style="color:#1f6138;">GH₵ ${workerPay}</span></div>
    <div class="row"><span class="row-key">BeyondX Fee</span><span class="row-val">GH₵ ${fee}</span></div>
    <div class="row"><span class="row-key">Date</span><span class="row-val">${new Date(t.createdAt).toLocaleDateString()}</span></div>
    ${t.description?`<div class="row"><span class="row-key">Notes</span><span class="row-val" style="font-size:11px;max-width:300px;text-align:right;">${t.description}</span></div>`:''}
    ${payoutSection}
  </div>`;
}

async function markPaid(id, name, amount){
  if(!confirm(`Have you sent GH₵ ${amount} to ${name}?`)) return;
  try {
    const r = await fetch(`${API}/admin/tasks/${id}/paid`, {
      method: 'PATCH',
      headers: {'x-admin-password': pass}
    });
    if(r.ok){ showToast(`✓ ${name} marked as paid`); await load(); }
    else showToast('Failed. Try again.');
  } catch(e){ showToast('Connection error'); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

setInterval(() => { if(pass) load(); }, 60000);
</script>
</body>
</html>
